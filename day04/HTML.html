        </thead>
        <tbody>     <!-- 테이블의 본문 구역 -->

                <td>
                    데이터1
                </td>
                <td rowspan="2">
                    데이터2

            </tr>
            <tr>
                <td>
                    데이터 4
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    데이터 3          
                </td>
            </tr>


        </tbody>

        </tfoot>

    <script src="HTML.js"></script>
